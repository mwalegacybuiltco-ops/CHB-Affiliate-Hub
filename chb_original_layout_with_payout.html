<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canine Haven Boutique Hub</title>

<style>
body{margin:0;font-family:Arial;background:#0f0b14;color:white}
.wrap{max-width:1100px;margin:auto;padding:20px}
.hero{background:#1a1323;border-radius:20px;padding:20px;margin-bottom:20px}
.btn{padding:12px 14px;margin:5px;border-radius:10px;text-decoration:none;font-weight:bold;display:inline-block}
.gold{background:#d4a73f;color:black}
.purple{background:#4b1f72;color:white}
.card{background:#1a1323;padding:20px;border-radius:16px;margin-bottom:15px}
input,textarea,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none}
.lead{background:#2a1d3b;padding:10px;border-radius:10px;margin-top:10px}
</style>

<script>
function missing(name){alert(name + " link not added yet")}

// LEADS SYSTEM
function saveLead(){
  let name = document.getElementById("name").value;
  let note = document.getElementById("note").value;

  if(name==="") return alert("Enter a name");

  let leads = JSON.parse(localStorage.getItem("leads")||"[]");

  leads.push({
    name,
    note,
    date:new Date().toLocaleDateString()
  });

  localStorage.setItem("leads", JSON.stringify(leads));
  displayLeads();

  document.getElementById("name").value="";
  document.getElementById("note").value="";
}

function displayLeads(){
  let leads = JSON.parse(localStorage.getItem("leads")||"[]");
  let box = document.getElementById("leadList");
  box.innerHTML="";

  leads.forEach((l,i)=>{
    box.innerHTML += `
      <div class="lead">
        <strong>${l.name}</strong><br>
        ${l.note}<br>
        <small>${l.date}</small><br>
        <button onclick="deleteLead(${i})">Delete</button>
      </div>
    `;
  });
}

function deleteLead(i){
  let leads = JSON.parse(localStorage.getItem("leads")||"[]");
  leads.splice(i,1);
  localStorage.setItem("leads", JSON.stringify(leads));
  displayLeads();
}

window.onload = displayLeads;
</script>

</head>

<body>
<div class="wrap">

<div class="hero">
<h1>Canine Haven Boutique Hub</h1>
<a class="btn gold">START HERE</a>
<a class="btn purple">TRAINING</a>
<a class="btn gold">FOUR CORNERS</a>
<a class="btn purple">TEAM BUILDER</a>
</div>

<div class="card">
<h2>Store</h2>
<a onclick="missing('Store')" class="btn purple">Open Store</a>
</div>

<div class="card">
<h2>Training</h2>
<a onclick="missing('Module 1')" class="btn gold">Brand Basics</a>
<a onclick="missing('Module 2')" class="btn gold">Affiliate Credit</a>
<a onclick="missing('Module 3')" class="btn gold">Content Ideas</a>
</div>

<div class="card">
<h2>Four Corners</h2>
<a onclick="missing('Four Corners')" class="btn gold">Open</a>
</div>

<div class="card">
<h2>Team Builder</h2>
<a onclick="missing('Team Builder')" class="btn purple">Open</a>
</div>

<div class="card">
<h2>Groups</h2>
<a onclick="missing('Ambassador Group')" class="btn gold">Ambassador Group</a>
<a onclick="missing('VIP Group')" class="btn purple">VIP Group</a>
</div>

<div class="card">
<h2>Support</h2>
<a onclick="missing('Support')" class="btn purple">Help</a>
</div>

<div class="card">
<h2>Payout Request</h2>
<a onclick="missing('Payout')" class="btn gold">Request Payout</a>
</div>

<div class="card">
<h2>📅 Leads Tracker</h2>

<input id="name" placeholder="Lead name">
<textarea id="note" placeholder="Notes"></textarea>

<button onclick="saveLead()" class="btn gold">Add Lead</button>

<div id="leadList"></div>

</div>

</div>
</body>
</html>
